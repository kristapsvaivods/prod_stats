<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ražošanas Atsauce 2024/25</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold">Ražošanas Atsauce 2024/25</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-1">Iepakojumu ražošanas dati un efektivitāte</p>
      </div>
      <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-xl flex items-center gap-2">
        <i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span>
      </button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10" id="summaryCards">
      <!-- Filled by JS -->
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
      <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow">
        <h2 class="text-xl font-semibold mb-4">Iepakojumi pa veidiem (2025 vs 2026)</h2>
        <canvas id="packagesChart" height="140"></canvas>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow">
        <h2 class="text-xl font-semibold mb-4">Pieaugums % pa mēnešiem</h2>
        <canvas id="growthChart" height="140"></canvas>
      </div>
    </div>

    <!-- Data Table -->
    <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow overflow-hidden">
      <h2 class="text-xl font-semibold mb-4">Dati pa mēnešiem (2025 / 2026)</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="dataTable">
          <thead class="bg-gray-100 dark:bg-gray-700 sticky top-0">
            <tr>
              <th class="px-4 py-3 text-left">Mēnesis</th>
              <th class="px-4 py-3 text-right">250g</th>
              <th class="px-4 py-3 text-right">1kg</th>
              <th class="px-4 py-3 text-right">Bundža</th>
              <th class="px-4 py-3 text-right">500g</th>
              <th class="px-4 py-3 text-right">3kg</th>
              <th class="px-4 py-3 text-right font-bold">Kopā</th>
              <th class="px-4 py-3 text-right">Pieaugums %</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 dark:divide-gray-700" id="dataBody">
            <!-- Filled by JS -->
          </tbody>
        </table>
      </div>
    </div>

    <div class="text-center text-gray-500 dark:text-gray-400 text-xs mt-10">
      Ražošanas atsauce 2024/25 • Dati tiek ielādēti automātiski no Google Sheets
    </div>
  </div>

  <script>
    // === CHANGE THIS LINE TO YOUR CSV LINK ===
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTiqN8TgiBSUIl-x6_cuitcwGRu8AH5wP1NHmzz7SiV9877X_BWq18ruwPT0ufK-U9GcQ173yp1Xbo1/pub?gid=397601483&single=true&output=csv";

    let monthsData = [];
    let packagesChart, growthChart;

    async function loadDashboard() {
      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error("CSV nav pieejams");
        const csvText = await response.text();
        parseCSV(csvText);
        renderDashboard();
      } catch (err) {
        console.error(err);
        alert("Neizdevās ielādēt datus no CSV. Pārliecinies, ka saite ir publicēta kā CSV un mēģini vēlreiz.");
      }
    }

    function parseCSV(csvText) {
      const rows = csvText.trim().split('\n').map(row => row.split(','));
      monthsData = [];

      const monthNames = ['Janvāris','Februāris','Marts','Aprīlis','Maijs','Jūnijs','Jūlijs','Augusts','Septembris','Oktobris','Novembris','Decembris'];

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i].map(cell => cell.replace(/"/g, '').trim());

        // Detect month header
        let month = null;
        for (let cell of row) {
          if (monthNames.includes(cell)) {
            month = cell;
            break;
          }
        }

        if (month && row[0] && (row[0] === '2025' || row[0] === '2026')) {
          const year = row[0];
          const pkg250 = parseFloat(row[1]) || 0;
          const pkg1kg = parseFloat(row[2]) || 0;
          const pkgBundza = parseFloat(row[3]) || 0;
          const pkg500 = parseFloat(row[4]) || 0;
          const pkg3kg = parseFloat(row[5]) || 0;
          const total = parseFloat(row[6]) || 0;

          // Find growth % in the same block
          let growth = 0;
          if (i+1 < rows.length) {
            const nextRow = rows[i+1].map(c => c.replace(/"/g,'').trim());
            growth = parseFloat(nextRow.find(c => c.includes('.') && !isNaN(parseFloat(c)))) || 0;
          }

          monthsData.push({
            month: month,
            year: year,
            pkg250: pkg250,
            pkg1kg: pkg1kg,
            pkgBundza: pkgBundza,
            pkg500: pkg500,
            pkg3kg: pkg3kg,
            total: total,
            growth: growth
          });
        }
      }

      // Add overall averages (hardcoded from your sheet for now)
      window.overall = {
        avgGrowth: 47.34,
        avgPerHour: 20.58,
        avgPerDayOne: 75.85,
        avgPerMonthOne: 1668.71
      };
    }

    function renderDashboard() {
      // Summary Cards
      const cardsHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-emerald-600 dark:text-emerald-400 text-sm font-medium">Vidējais pieaugums</div>
          <div class="text-5xl font-bold mt-2">+${window.overall.avgGrowth}%</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-blue-600 dark:text-blue-400 text-sm font-medium">Vidēji stundā (viens)</div>
          <div class="text-5xl font-bold mt-2">${window.overall.avgPerHour}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-amber-600 dark:text-amber-400 text-sm font-medium">Vidēji dienā (viens)</div>
          <div class="text-5xl font-bold mt-2">${window.overall.avgPerDayOne}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-purple-600 dark:text-purple-400 text-sm font-medium">Vidēji mēnesī (viens)</div>
          <div class="text-5xl font-bold mt-2">${window.overall.avgPerMonthOne}</div>
        </div>
      `;
      document.getElementById('summaryCards').innerHTML = cardsHTML;

      // Prepare chart data
      const labels = [...new Set(monthsData.map(d => d.month))];
      const totals2025 = monthsData.filter(d => d.year === '2025').map(d => d.total);
      const totals2026 = monthsData.filter(d => d.year === '2026').map(d => d.total);
      const growths = monthsData.filter(d => d.growth > 0).map(d => d.growth);

      // Packages Bar Chart
      if (packagesChart) packagesChart.destroy();
      packagesChart = new Chart(document.getElementById('packagesChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: '2025', data: totals2025, backgroundColor: '#10b981', borderRadius: 6 },
            { label: '2026', data: totals2026, backgroundColor: '#3b82f6', borderRadius: 6 }
          ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
      });

      // Growth Line Chart
      if (growthChart) growthChart.destroy();
      growthChart = new Chart(document.getElementById('growthChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Pieaugums %',
            data: growths,
            borderColor: '#eab308',
            tension: 0.4,
            borderWidth: 5,
            pointRadius: 5
          }]
        },
        options: { responsive: true }
      });

      // Table
      const tbody = document.getElementById('dataBody');
      tbody.innerHTML = '';
      monthsData.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="px-4 py-4 font-medium">${item.month} ${item.year}</td>
          <td class="px-4 py-4 text-right">${item.pkg250.toLocaleString('lv-LV')}</td>
          <td class="px-4 py-4 text-right">${item.pkg1kg.toLocaleString('lv-LV')}</td>
          <td class="px-4 py-4 text-right">${item.pkgBundza.toLocaleString('lv-LV')}</td>
          <td class="px-4 py-4 text-right">${item.pkg500.toLocaleString('lv-LV')}</td>
          <td class="px-4 py-4 text-right">${item.pkg3kg.toLocaleString('lv-LV')}</td>
          <td class="px-4 py-4 text-right font-bold">${item.total.toLocaleString('lv-LV')}</td>
          <td class="px-4 py-4 text-right text-emerald-600 font-medium">${item.growth ? '+' + item.growth + '%' : '-'}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      const text = document.getElementById('theme-text');
      text.textContent = document.documentElement.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
    }

    // Load data when page opens
    window.onload = loadDashboard;
  </script>
</body>
</html>
