<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ražošanas Atsauce 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-emerald-600">Ražošanas Atsauce 2026</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-1">Fokuss uz pieaugumu salīdzinājumā ar 2025</p>
      </div>
      <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-xl flex items-center gap-2">
        <i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span>
      </button>
    </div>

    <!-- Dynamic Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10" id="summaryCards"></div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
      <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow">
        <h2 class="text-xl font-semibold mb-4">Kopā iepakojumi (2025 vs 2026)</h2>
        <canvas id="totalChart" height="140"></canvas>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow">
        <h2 class="text-xl font-semibold mb-4">Pieaugums % pa mēnešiem (2026)</h2>
        <canvas id="growthChart" height="140"></canvas>
      </div>
    </div>

    <!-- 2026 Table -->
    <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow overflow-hidden">
      <h2 class="text-2xl font-semibold mb-6">2026 Ražošanas rezultāti</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="dataTable">
          <thead class="bg-gray-100 dark:bg-gray-700">
            <tr>
              <th class="text-left py-4">Mēnesis</th>
              <th class="text-right">250g</th>
              <th class="text-right">1kg</th>
              <th class="text-right">Bundža</th>
              <th class="text-right">500g</th>
              <th class="text-right">3kg</th>
              <th class="text-right font-bold">Kopā</th>
              <th class="text-right text-emerald-600">Pieaugums %</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
        </table>
      </div>
    </div>

    <div class="text-center text-gray-500 dark:text-gray-400 text-xs mt-12">
      Dati automātiski ielādēti no Google Sheets
    </div>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTiqN8TgiBSUIl-x6_cuitcwGRu8AH5wP1NHmzz7SiV9877X_BWq18ruwPT0ufK-U9GcQ173yp1Xbo1/pub?gid=397601483&single=true&output=csv";

    let data2026 = [];
    let data2025 = [];
    let overallAvgGrowth = 47.34;   // fallback
    let avgPerHour = 20.58;

    async function loadData() {
      try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        parseCSV(csvText);
        renderAll();
      } catch (err) {
        console.error(err);
        alert("Neizdevās ielādēt datus no CSV.");
      }
    }

    function parseCSV(csvText) {
      const rows = csvText.trim().split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

      data2026 = [];
      data2025 = [];
      let currentMonth = "";

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];

        // Detect month
        const monthNames = ["Marts","Februāris","Javāris","Decembris","Novembris","Oktobris","Septembris","Augusts","Jūlijs","Jūnijs","Maijs"];
        if (monthNames.includes(row[0])) currentMonth = row[0];

        if (row[0] === "2025" || row[0] === "2026") {
          const year = row[0];
          const pkg250 = parseFloat(row[1]) || 0;
          const pkg1kg = parseFloat(row[2]) || 0;
          const pkgBundza = parseFloat(row[3]) || 0;
          const pkg500 = parseFloat(row[4]) || 0;
          const pkg3kg = parseFloat(row[5]) || 0;
          const total = parseFloat(row[6]) || 0;

          let growth = 0;
          for (let j = 7; j < row.length; j++) {
            const num = parseFloat(row[j]);
            if (!isNaN(num) && num > 0 && num < 500) {   // reasonable growth range
              growth = num;
              break;
            }
          }

          const entry = { month: currentMonth, pkg250, pkg1kg, pkgBundza, pkg500, pkg3kg, total, growth };

          if (year === "2026") data2026.push(entry);
          if (year === "2025") data2025.push(entry);
        }

        // Try to extract overall average growth and per hour from top of sheet
        if (row.join('').includes("Vidējais ražošanas pieaugums")) {
          const match = row.join(' ').match(/(\d+\.?\d*)/);
          if (match) overallAvgGrowth = parseFloat(match[1]);
        }
        if (row.join('').includes("Stundā") && row.join('').includes("Viens")) {
          const match = row.join(' ').match(/(\d+\.?\d*)/);
          if (match) avgPerHour = parseFloat(match[1]);
        }
      }
    }

    function renderAll() {
      renderDynamicSummary();
      renderTable();
      renderCharts();
    }

    function renderDynamicSummary() {
      const avgGrowth = overallAvgGrowth || 47.34;
      const avgHour = avgPerHour || 20.58;

      // Calculate simple averages from 2026 data
      const avgTotal2026 = data2026.length ? 
        (data2026.reduce((sum, item) => sum + item.total, 0) / data2026.length).toFixed(0) : "~1800";

      const html = `
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-emerald-600 text-sm font-medium">Vidējais pieaugums 2026</div>
          <div class="text-5xl font-bold mt-2 text-emerald-600">+${avgGrowth}%</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-blue-600 text-sm font-medium">Vidēji stundā (1 cilvēks)</div>
          <div class="text-5xl font-bold mt-2">${avgHour}</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-amber-600 text-sm font-medium">Vidēji dienā (1 cilvēks)</div>
          <div class="text-5xl font-bold mt-2">~82</div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 card shadow">
          <div class="text-purple-600 text-sm font-medium">Vidēji mēnesī (1 cilvēks)</div>
          <div class="text-5xl font-bold mt-2">${avgTotal2026}</div>
        </div>
      `;
      document.getElementById("summaryCards").innerHTML = html;
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      data2026.forEach(item => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-gray-50 dark:hover:bg-gray-700";
        tr.innerHTML = `
          <td class="py-4 font-medium">${item.month}</td>
          <td class="text-right">${item.pkg250.toLocaleString('lv-LV')}</td>
          <td class="text-right">${item.pkg1kg.toLocaleString('lv-LV')}</td>
          <td class="text-right">${item.pkgBundza.toLocaleString('lv-LV')}</td>
          <td class="text-right">${item.pkg500.toLocaleString('lv-LV')}</td>
          <td class="text-right">${item.pkg3kg.toLocaleString('lv-LV')}</td>
          <td class="text-right font-bold">${item.total.toLocaleString('lv-LV')}</td>
          <td class="text-right text-emerald-600 font-semibold">+${item.growth.toFixed(2)}%</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderCharts() {
      const months = data2026.map(d => d.month);
      const totals2025 = data2025.map(d => d.total);
      const totals2026 = data2026.map(d => d.total);
      const growths = data2026.map(d => d.growth);

      new Chart(document.getElementById('totalChart'), {
        type: 'bar',
        data: {
          labels: months,
          datasets: [
            { label: '2025', data: totals2025, backgroundColor: '#9ca3af' },
            { label: '2026', data: totals2026, backgroundColor: '#10b981' }
          ]
        },
        options: { responsive: true }
      });

      new Chart(document.getElementById('growthChart'), {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Pieaugums %',
            data: growths,
            borderColor: '#eab308',
            tension: 0.4,
            borderWidth: 5
          }]
        },
        options: { responsive: true }
      });
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      document.getElementById('theme-text').textContent = 
        document.documentElement.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
    }

    window.onload = loadData;
  </script>
</body>
</html>
